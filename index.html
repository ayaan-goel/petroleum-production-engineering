<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petroleum Production Engineering - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .unit-card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 2rem;
            text-align: center;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        .unit-card h2 {
            font-size: 1.8rem;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }
        .unit-card p {
            color: var(--text-muted);
        }
        .icon-wrapper {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header class="glass-panel">
            <h1>Petroleum Production Engineering</h1>
            <p class="subtitle">Interactive Portfolio & Numericals Dashboard</p>
        </header>

        <div class="dashboard-grid">
            <!-- Unit 2 Card -->
            <a href="UNIT_2_POST_MIDSEM/index.html" class="unit-card">
                <div class="icon-wrapper">📊</div>
                <h2>Unit 2</h2>
                <p>Post Midsem Numericals (Tubing Performance & Gilbert Curves)</p>
            </a>
            
            <!-- Future Unit Placeholder -->
            <a href="#" class="unit-card" style="opacity: 0.5; cursor: not-allowed;" onclick="event.preventDefault();">
                <div class="icon-wrapper">⏳</div>
                <h2>Unit 1</h2>
                <p>Pre Midsem Numericals (Coming Soon)</p>
            </a>
        </div>
    </div>
</body>
</html>
