<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petroleum Production Engineering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
        .unit-card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 3rem 2rem;
            text-align: center;
            border-radius: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .unit-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            border-color: rgba(255,255,255,0.2);
        }
        .unit-card h2 {
            font-size: 2rem;
            color: #f8fafc;
            margin-bottom: 0.5rem;
        }
        .unit-card p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .icon-wrapper {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
        .disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header class="glass-panel" style="text-align: center; padding: 4rem 2rem;">
            <h1 style="font-size: 3.5rem; margin-bottom: 1rem;">Petroleum Production Engineering</h1>
            <p class="subtitle" style="font-size: 1.5rem;">Interactive Academic Portfolio</p>
        </header>

        <div class="dashboard-grid">
            <!-- Endsem Card -->
            <a href="#" class="unit-card disabled" style="border-color: #ef4444; background: rgba(239, 68, 68, 0.05);">
                <div class="icon-wrapper">🎓</div>
                <h2>Endsem</h2>
                <p>Coming Soon</p>
            </a>

            <!-- Theory Card -->
            <a href="theory/index.html" class="unit-card" style="border-color: #8b5cf6; background: rgba(139, 92, 246, 0.05);">
                <div class="icon-wrapper">📖</div>
                <h2>Theory</h2>
                <p>Units 1, 2, 3 & 4</p>
            </a>
            
            <!-- Numericals Card -->
            <a href="numericals/index.html" class="unit-card" style="border-color: #3b82f6; background: rgba(59, 130, 246, 0.05);">
                <div class="icon-wrapper">🧮</div>
                <h2>Numericals</h2>
                <p>Pre & Post Midsem Solutions</p>
            </a>
        </div>
    </div>
</body>
</html>
